[libdefaults]
	default_realm = IFG.BR
	dns_lookup_realm = false
	dns_lookup_kdc = true
	default_ccache_name = /run/user/%{uid}/krb5cc
	## rdns = false
	allow_weak_crypto = true
	forwardable = true

[realms]
	IFG.BR = {
		kdc = AD-GOIAS.IFG.BR
		default_domain = IFG.BR
		admin_server = AD-GOIAS.IFG.BR
		# auth_to_local = RULE:[1:$1@$0](.*@.*)s/(.*)/g$1/
	}
	IFG = {
		kdc = AD-GOIAS.IFG.BR
		default_domain = IFG.BR
		admin_server = AD-GOIAS.IFG.BR
		# auth_to_local = RULE:[1:$1@$0](.*@.*)s/(.*)/g$1/
	}
