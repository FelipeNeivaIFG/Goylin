[Greeter]
background=/usr/share/goylin/wallpapers/wall-current.jpg
clock-format=%l:%M %p
stretch-background-across-monitors=false
only-on-monitor=-1 # -1 means "follow the mouse"
show-power=true
activate-numlock=true
draw-grid=false
show-hostname=true
show-a11y=false
show-keyboard=false
show-clock=true
show-quit=true
draw-user-backgrounds=false
enable-hidpi=auto
hidden-users=admin
screen-reader=false
high-contrast=false
onscreen-keyboard=false