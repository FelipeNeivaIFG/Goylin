[options]
HoldPkg = pacman glibc
Architecture = auto
Color
ILoveCandy
CheckSpace
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

[goylin-repo]
SigLevel = Optional TrustAll
Server = http://10.11.0.111/goylin-repo

[goylin-repo-aur]
SigLevel = Optional TrustAll
Server = http://10.11.0.111/goylin-repo-aur

[goylin-repo-g]
SigLevel = Optional TrustAll
Server = http://10.11.0.111/goylin-repo-g